services:
  postgres:
    image: postgres:16
    container_name: sp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sp_user
      POSTGRES_PASSWORD: sp_password
      POSTGRES_DB: software_press
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sp_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: sp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: sp-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: sp-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ./models/ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5

  api:
    build: ./services/api
    container_name: sp-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://sp_user:sp_password@postgres:5432/software_press
      REDIS_URL: redis://redis:6379
    ports:
      - "8000:8000"

  agent-runner:
    build: ./services/agent-runner
    container_name: sp-agent-runner
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped
    volumes:
      - ./artifacts:/artifacts
      - ./logs:/app/logs
      - ./datasets:/app/datasets
      - ./workspaces:/workspace
    environment:
      DATABASE_URL: postgresql://sp_user:sp_password@postgres:5432/software_press
      REDIS_URL: redis://redis:6379
      OLLAMA_BASE_URL: http://ollama:11434/v1
      OPENCODE_MODEL: llama3.1:8b
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: artifacts
      WORKSPACE_ROOT: /workspace
      ARTIFACT_ROOT: /artifacts

  ollama-init:
    image: ollama/ollama:latest
    container_name: sp-ollama-init
    depends_on:
      ollama:
        condition: service_started
    volumes:
      - ./models/ollama:/root/.ollama
      - ./scripts:/scripts
    entrypoint: ["/bin/sh", "/scripts/bootstrap.sh"]

volumes:
  postgres_data:
  redis_data:
  minio_data: