services:
  postgres:
    image: postgres:16
    container_name: sf-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sf_user
      POSTGRES_PASSWORD: sf_password
      POSTGRES_DB: software_factory
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sf_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: sf-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: sf-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: sf-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ./models/ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5

  agent-runner:
    build:
      context: ./services/agent-runner
    container_name: sf-agent-runner
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://sf_user:sf_password@postgres:5432/software_factory
      REDIS_URL: redis://redis:6379
      OLLAMA_BASE_URL: http://ollama:11434
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: artifacts
    ports:
      - "8000:8000"
    volumes:
      - ./artifacts:/app/artifacts
      - ./logs:/app/logs
      - ./datasets:/app/datasets

  ollama-init:
    image: ollama/ollama:latest
    container_name: sf-ollama-init
    depends_on:
      ollama:
        condition: service_started
    volumes:
      - ./models/ollama:/root/.ollama
      - ./scripts:/scripts
    entrypoint: ["/bin/sh", "/scripts/bootstrap.sh"]

volumes:
  postgres_data:
  redis_data:
  minio_data: